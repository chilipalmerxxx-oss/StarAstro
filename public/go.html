<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Nightstar — ouverture</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #050608;
        color: #f4efe6;
        font-family: system-ui, -apple-system, sans-serif;
      }
      main {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }
      p { opacity: 0.7; line-height: 1.5; }
    </style>
  </head>
  <body>
    <main>
      <div>
        <p>Chargement de la dernière version…</p>
      </div>
    </main>
    <script>
      (function () {
        var target = '/?fresh=' + Date.now();
        var tasks = [];

        try {
          localStorage.removeItem('nightstar-build-id');
        } catch (e) {}

        if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
          tasks.push(
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(
                regs.map(function (reg) {
                  return reg.unregister();
                })
              );
            })
          );
        }

        if (window.caches && caches.keys) {
          tasks.push(
            caches.keys().then(function (keys) {
              return Promise.all(
                keys.map(function (key) {
                  return caches.delete(key);
                })
              );
            })
          );
        }

        Promise.all(tasks)
          .catch(function () {})
          .then(function () {
            window.location.replace(target);
          });
      })();
    </script>
  </body>
</html>
